services:
  backend:
    build: ./backend
    ports:
      - "5001:5000"
    volumes:
      - ./backend/jlpt.db:/app/jlpt.db
    env_file:
      - ./backend/.env
    environment:
      - FLASK_ENV=development

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
